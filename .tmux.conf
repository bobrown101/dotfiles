
set -g prefix \\
bind \\ send-prefix

set -g default-command /opt/homebrew/bin/fish
set -g default-shell /opt/homebrew/bin/fish
set -g mouse on
set -g automatic-rename off

# Enable RGB color
set-option -g default-terminal "screen-256color"
set-option -g focus-events on
# set -g default-terminal 'xterm-256color'
# set-option -ga terminal-overrides ",xterm-256color:Tc"

# Neovim
set -sg escape-time 0

unbind ' '

#####################################
# Windows
#####################################
unbind '"'
unbind %
bind h split-window -h
bind v split-window -v

unbind c # original create window
unbind & # original close current window
unbind p # original previous windows
unbind n # original next window

bind n new-window
bind Tab next-window

#####################################
# Panes
#####################################
unbind up
unbind down
unbind left
unbind right

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#####################################
# Status bar
#####################################
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26,nobold]  "
set -g status-right "#[fg=#3b4261]#[fg=#a9b1d6,bg=#3b4261] %H:%M #[fg=#7aa2f7,bg=#3b4261]#[fg=#1a1b26,bg=#7aa2f7,bold] %b %d "

set -g window-status-format "#[fg=#3b4261,bg=#1a1b26]#[fg=#545c7e,bg=#3b4261] #I:#W #[fg=#3b4261,bg=#1a1b26]"
set -g window-status-current-format "#[fg=#e0af68,bg=#1a1b26]#[fg=#1a1b26,bg=#e0af68,bold] #I:#W #[fg=#e0af68,bg=#1a1b26]"
set -g window-status-separator "  "

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#3b4261,fg=#a9b1d6"
